# 复制为 secret.yaml 后填值再 kubectl apply -f secret.yaml
# ⚠️ secret.yaml 不要 commit，加进 .gitignore（建议 deploy/k8s/secret.yaml）
apiVersion: v1
kind: Secret
metadata:
  name: frame-0-secrets
  namespace: frame-0
type: Opaque
stringData:
  # 全部可选 —— 留空则强制访客在网页里自带 key（推荐，更安全）
  DASHSCOPE_API_KEY: ""
  REDDIT_CLIENT_ID: ""
  REDDIT_CLIENT_SECRET: ""
  REDDIT_USER_AGENT: ""
