apiVersion: apps/v1
kind: Deployment
metadata:
  name: frame-0
  namespace: frame-0
  labels:
    app.kubernetes.io/name: frame-0
spec:
  # ⚠️ 默认 1 副本。项目用本地 /app/data 持久化，ReadWriteOnce 卷只能挂一处。
  # 要水平扩展（HPA）必须先把 PVC 换成 ReadWriteMany，或把状态迁外部存储。
  replicas: 1
  strategy:
    type: Recreate   # RWO 卷不允许两个 Pod 同时挂载，禁用滚动更新避免冲突
  selector:
    matchLabels:
      app.kubernetes.io/name: frame-0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frame-0
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: frame-0
          # 改成你 registry 的镜像，例如 registry.example.com/frame-0:v1
          image: frame-0:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: frame-0-config
            - secretRef:
                name: frame-0-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
          # 用 /api/health —— 轻量 JSON 接口，不渲染整个首页 + force-dynamic 绕开缓存
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: frame-0-data
