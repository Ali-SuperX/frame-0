# 可选 —— 用 nginx-ingress / traefik 等。把 host 改成你的域名。
# 集群装了 cert-manager 时把 annotation 和 tls 块 uncomment，自动签发 HTTPS。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frame-0
  namespace: frame-0
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - frame-0.example.com
  #     secretName: frame-0-tls
  rules:
    - host: frame-0.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frame-0
                port:
                  number: 80
